services:
  postgres:
    image: docker.io/postgres:18.3-alpine3.23
    restart: always
    volumes:
      - ./.storage/postgres:/var/lib/postgresql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - .env
    ports:
      - "${HOST_IP-127.0.0.1}:${HOST_PORT-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      timeout: 5s
